[package]
name = "wiener_poc"
version = "0.1.0"
edition = "2021"

[lib]
name = "wiener_poc"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.21.0", features = ["extension-module"] }
numpy = "0.21.0"
ndarray = "0.15.6"
cudarc = { version = "0.19.4", features = ["cuda-version-from-build-system"] }
multiversion = "0.7.3"

[build-dependencies]
cc = "1.0"
